<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 Dyslexia Quest – 20 Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0D0626; --card:rgba(255,255,255,0.07); --border:rgba(255,255,255,0.11);
      --primary:#FF6B35; --yellow:#FFD23F; --blue:#4CC9F0; --green:#57CC99; --red:#FF6B6B;
      --text:#fff; --dim:rgba(255,255,255,0.6);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;min-height:100vh;font-family:'Nunito','Arial Rounded MT Bold',sans-serif;background:var(--bg);overflow-x:hidden;-webkit-tap-highlight-color:transparent;}

    /* ── PAGES ── */
    .page{display:none;position:fixed;inset:0;overflow-y:auto;padding:14px 14px 80px;z-index:1;}
    .page.active{display:block;animation:pageIn .35s ease;}
    @keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

    /* ── BG FLOATS ── */
    .bg-anim{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
    .fi{position:absolute;opacity:.1;animation:floatUp linear infinite;}
    @keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0;}10%{opacity:.13;}90%{opacity:.13;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}

    /* ── HOME ── */
    #page-home{background:radial-gradient(ellipse at 25% 15%,#1e0a4e 0%,var(--bg) 65%);padding:22px 14px 100px;}
    .home-inner{position:relative;z-index:2;max-width:1040px;margin:0 auto;text-align:center;}
    .hero-title{font-size:clamp(2.4rem,6vw,4.2rem);font-weight:900;background:linear-gradient(135deg,#FFD23F,#FF6B35 50%,#FF6B6B);background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;line-height:1.15;}
    @keyframes shimmer{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
    .hero-sub{font-size:clamp(1rem,3vw,1.3rem);color:var(--blue);margin-top:8px;font-weight:700;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;margin:12px 0 18px;background:rgba(76,201,240,.1);border:1.5px solid rgba(76,201,240,.2);padding:6px 20px;border-radius:60px;color:var(--blue);font-weight:800;font-size:.95rem;}

    /* ── HOME GRID – all 20 always visible ── */
    .home-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;width:100%;}
    @media(max-width:900px){.home-grid{grid-template-columns:repeat(4,1fr);}}
    @media(max-width:560px){.home-grid{grid-template-columns:repeat(4,1fr);gap:8px;}}
    @media(max-width:380px){.home-grid{grid-template-columns:repeat(3,1fr);gap:6px;}}

    .hcard{background:rgba(255,255,255,.055);border:1.5px solid rgba(255,255,255,.08);border-radius:18px;padding:13px 5px 11px;text-align:center;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .2s,border-color .2s;user-select:none;}
    .hcard:hover,.hcard:active{transform:translateY(-6px) scale(1.06);background:rgba(255,255,255,.12);border-color:var(--yellow);box-shadow:0 8px 22px rgba(255,210,63,.18);}
    .hcard .ic{font-size:2rem;display:block;margin-bottom:5px;}
    .hcard .nm{font-weight:800;color:#fff;font-size:.76rem;line-height:1.2;}
    .hcard .gn{font-size:.58rem;font-weight:700;background:rgba(76,201,240,.14);color:var(--blue);border-radius:20px;padding:2px 7px;display:inline-block;margin-top:3px;}
    @media(max-width:560px){.hcard{border-radius:13px;padding:9px 3px 8px;}.hcard .ic{font-size:1.75rem;}.hcard .nm{font-size:.68rem;}}
    @media(max-width:380px){.hcard{border-radius:11px;padding:7px 2px 6px;}.hcard .ic{font-size:1.5rem;margin-bottom:3px;}.hcard .nm{font-size:.62rem;}}

    .btn-site{display:inline-flex;align-items:center;gap:8px;margin-top:22px;padding:11px 26px;background:rgba(76,201,240,.12);color:var(--blue);border:1.5px solid rgba(76,201,240,.25);border-radius:60px;font-family:'Nunito',sans-serif;font-weight:800;text-decoration:none;font-size:.95rem;transition:.2s;cursor:pointer;}
    .btn-site:hover{background:rgba(76,201,240,.22);transform:scale(1.04);}

    /* ── GAME CARD ── */
    .gcard{position:relative;z-index:2;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--border);border-radius:30px;padding:24px 20px 32px;max-width:760px;width:100%;margin:14px auto;box-shadow:0 22px 60px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);animation:cardPop .45s cubic-bezier(.34,1.56,.64,1);}
    @keyframes cardPop{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:none;}}
    @media(max-width:600px){.gcard{padding:16px 12px 24px;border-radius:22px;}}

    /* ── GAME HEADER ── */
    .ghdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.07);flex-wrap:wrap;}
    .ghic{font-size:2.3rem;flex-shrink:0;}
    .ghtitle{font-size:1.5rem;font-weight:900;color:#fff;}
    .ghdesc{color:var(--dim);font-size:.86rem;font-weight:600;margin-top:2px;}

    /* ── LEVEL HEADER ── */
    .lvlhdr{display:flex;align-items:center;gap:9px;margin-bottom:13px;flex-wrap:wrap;}
    .lvlbadge{background:var(--yellow);color:#1a0b3b;padding:4px 15px;border-radius:30px;font-weight:900;font-size:.88rem;}
    .progwrap{flex:1;background:rgba(255,255,255,.07);border-radius:30px;height:10px;min-width:55px;overflow:hidden;}
    .progfill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:30px;transition:width .5s ease;}
    .scorelbl{color:var(--dim);font-size:.8rem;font-weight:700;white-space:nowrap;}
    .strkbadge{background:linear-gradient(135deg,#FF6B35,#FFD23F);color:#fff;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:900;display:none;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
    .strkbadge.on{display:inline-block;}
    @keyframes popIn{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}

    /* ── MASCOT ── */
    .mascwrap{text-align:center;margin:5px 0 10px;}
    .masc{font-size:2.5rem;display:inline-block;animation:mascFloat 3.5s ease-in-out infinite;}
    @keyframes mascFloat{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-10px) rotate(4deg);}}
    .masc.celeb{animation:mascCeleb .7s cubic-bezier(.34,1.56,.64,1);}
    @keyframes mascCeleb{0%{transform:scale(1);}35%{transform:scale(1.65) rotate(-15deg);}65%{transform:scale(1.4) rotate(15deg);}100%{transform:scale(1);}}
    .masc.oops{animation:mascOops .5s ease;}
    @keyframes mascOops{0%,100%{transform:translateX(0);}25%{transform:translateX(-14px) rotate(-8deg);}75%{transform:translateX(14px) rotate(8deg);}}

    /* ── QUESTION TEXT ── */
    .qtxt{font-size:clamp(1rem,3.5vw,1.3rem);font-weight:700;color:#fff;text-align:center;margin:8px 0 13px;line-height:1.55;}
    .wbig{font-size:clamp(1.8rem,7vw,3rem);font-weight:900;letter-spacing:4px;color:#fff;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);padding:13px 22px;border-radius:34px;display:block;text-align:center;margin:13px auto;}

    /* ── OPTIONS ── */
    .opts{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:13px 0;}
    .opt{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:38px;padding:11px 20px;font-size:clamp(.97rem,3vw,1.25rem);font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;color:#fff;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s;min-height:50px;min-width:62px;-webkit-tap-highlight-color:transparent;}
    .opt:hover:not([disabled]){background:rgba(255,255,255,.13);border-color:rgba(255,210,63,.5);transform:scale(1.07) translateY(-2px);}
    .opt.correct{background:rgba(87,204,153,.22);border-color:var(--green);animation:popAnim .4s cubic-bezier(.34,1.56,.64,1);}
    .opt.wrong{background:rgba(255,107,107,.18);border-color:var(--red);animation:shk .4s ease;}
    .opt[disabled]{cursor:default;}
    @keyframes popAnim{0%{transform:scale(1);}50%{transform:scale(1.22);}100%{transform:scale(1);}}
    @keyframes shk{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

    /* ── FEEDBACK ── */
    .fb{padding:12px 16px;border-radius:20px;margin:11px 0;background:rgba(0,0,0,.2);border:1.5px solid rgba(255,255,255,.06);min-height:50px;display:flex;align-items:center;gap:9px;font-size:.97rem;font-weight:700;color:var(--dim);transition:all .3s;}
    .fb.correct{background:rgba(87,204,153,.1);border-color:var(--green);color:var(--green);}
    .fb.wrong{background:rgba(255,107,107,.1);border-color:var(--red);color:#ff9a9a;}

    /* ── TIMER ── */
    .timerwrap{background:rgba(255,255,255,.06);border-radius:30px;height:8px;overflow:hidden;margin:7px 0;}
    .timerfill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));border-radius:30px;transition:width 1s linear;}

    /* ── BUTTONS ── */
    .btnrow{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:13px;}
    .btn{padding:10px 22px;border:none;border-radius:38px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.93rem;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);min-height:44px;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
    .btn:hover{transform:scale(1.07) translateY(-2px);}
    .btn:active{transform:scale(.96);}
    .btn-next{background:var(--green);color:#fff;display:none;}
    .btn-next.on{display:inline-flex;}
    .btn-rst{background:var(--primary);color:#fff;}
    .btn-chk{background:var(--yellow);color:#1a0b3b;}
    .btn-hint{background:rgba(76,201,240,.15);color:var(--blue);border:1.5px solid rgba(76,201,240,.3);}

    /* ── INPUT ── */
    .inpwrap{display:flex;gap:9px;justify-content:center;align-items:center;flex-wrap:wrap;margin:13px 0;}
    .inp{font-size:1.2rem;font-family:'Nunito',sans-serif;font-weight:700;padding:11px 17px;border-radius:38px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;width:205px;max-width:100%;outline:none;text-align:center;letter-spacing:2px;transition:border-color .2s;}
    .inp::placeholder{color:rgba(255,255,255,.3);letter-spacing:0;}
    .inp:focus{border-color:var(--yellow);}

    /* ── MEMORY CARDS ── */
    .cg{display:grid;gap:9px;margin:13px auto;max-width:520px;}
    .mc{aspect-ratio:1;border-radius:16px;cursor:pointer;transition:transform .4s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d;position:relative;user-select:none;}
    .mcf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;font-size:clamp(1.5rem,5vw,2.2rem);font-weight:800;}
    .mcfront{background:linear-gradient(145deg,#2a1a5e,#1a0b3b);border:2px solid rgba(255,255,255,.08);color:rgba(255,255,255,.28);font-size:1.7rem;}
    .mcback{background:linear-gradient(145deg,#FFD23F,#FF6B35);transform:rotateY(180deg);color:#1a0b3b;}
    .mc.flip{transform:rotateY(180deg);}
    .mc.matched .mcback{background:linear-gradient(145deg,#57CC99,#22a870);color:#fff;}
    .mc.matched{pointer-events:none;}

    /* ── WORD SEARCH ── */
    .wsg{display:grid;gap:5px;margin:13px auto;max-width:430px;}
    .wsc{aspect-ratio:1;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.06);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:clamp(.9rem,3vw,1.25rem);font-weight:800;cursor:pointer;color:#fff;transition:.15s;user-select:none;}
    .wsc:hover{background:rgba(255,255,255,.12);border-color:rgba(255,210,63,.4);}
    .wsc.sel{background:rgba(255,210,63,.18);border-color:var(--yellow);}
    .wsc.found{background:rgba(87,204,153,.2);border-color:var(--green);cursor:default;}
    .wsc.blink{animation:shk .3s;}

    /* ── SORT ITEMS ── */
    .sortlist{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
    .sortitem{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:17px;padding:11px 16px;cursor:pointer;font-size:1rem;font-weight:700;color:#fff;transition:.2s;width:100%;text-align:left;font-family:'Nunito',sans-serif;}
    .sortitem:hover{background:rgba(255,255,255,.12);border-color:rgba(255,210,63,.4);transform:translateX(4px);}
    .sortitem.correct{background:rgba(87,204,153,.18);border-color:var(--green);pointer-events:none;}
    .sortitem.wrong{background:rgba(255,107,107,.15);border-color:var(--red);animation:shk .3s;}

    /* ── LETTER GRID (Initial Sound) ── */
    .ltrgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;max-width:370px;margin:13px auto;}
    .ltropt{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:15px;padding:12px 7px;font-size:1.55rem;font-weight:900;color:#fff;text-align:center;cursor:pointer;transition:.2s;min-height:54px;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
    .ltropt:hover{background:rgba(255,255,255,.13);border-color:rgba(255,210,63,.5);transform:scale(1.08);}
    .ltropt.correct{background:rgba(87,204,153,.2);border-color:var(--green);}
    .ltropt.wrong{background:rgba(255,107,107,.15);border-color:var(--red);animation:shk .3s;}

    /* ── FLASH WORD ── */
    .flashword{font-size:clamp(1.9rem,7vw,3rem);font-weight:900;color:#fff;text-align:center;background:rgba(255,210,63,.1);border:2px solid rgba(255,210,63,.25);border-radius:27px;padding:17px 24px;letter-spacing:5px;transition:opacity .6s ease;margin:13px auto;display:block;}
    .flashword.hidden{opacity:0;pointer-events:none;}

    /* ── SYLLABLE BEATS ── */
    .beatsrow{display:flex;gap:8px;justify-content:center;margin:11px 0;}
    .beat{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);transition:.15s;}
    .beat.on{background:var(--yellow);border-color:var(--yellow);transform:scale(1.3);}

    /* ── CROSSWORD BOXES ── */
    .cwboxes{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:15px 0;}
    .cwbox{width:50px;height:50px;border:2.5px solid rgba(255,255,255,.2);border-radius:11px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:1.65rem;font-weight:900;color:#fff;transition:.2s;}
    .cwbox.revealed{border-color:var(--green);background:rgba(87,204,153,.12);color:var(--green);}
    @media(max-width:500px){.cwbox{width:42px;height:42px;font-size:1.3rem;}}

    /* ── VOWEL HUNT ── */
    .ltrchips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:13px 0;}
    .chip{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;font-weight:900;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;}
    .chip.v{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.4);color:var(--primary);}

    /* ── PATTERN BLOCKS ── */
    .patrow{display:flex;gap:9px;justify-content:center;align-items:center;flex-wrap:wrap;margin:12px 0;}
    .pblk{width:56px;height:56px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.65rem;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);}
    .pblk.blank{border-style:dashed;border-color:var(--yellow);background:rgba(255,210,63,.07);color:rgba(255,255,255,.25);font-size:1.2rem;}

    /* ── GAME TIP ── */
    .tip{background:rgba(76,201,240,.07);border:1px solid rgba(76,201,240,.12);border-radius:13px;padding:8px 13px;font-size:.83rem;font-weight:600;color:rgba(76,201,240,.8);margin-bottom:11px;text-align:center;}

    /* ── AI LOADING ── */
    .aiload{display:flex;flex-direction:column;align-items:center;gap:13px;padding:28px 18px;color:var(--dim);font-weight:700;}
    .spinner{width:40px;height:40px;border:4px solid rgba(76,201,240,.12);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── CONFETTI ── */
    .confbox{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
    .cp{position:absolute;border-radius:3px;animation:cffall ease-out forwards;}
    @keyframes cffall{from{transform:translateY(-30px) rotate(0deg);opacity:1;}to{transform:translateY(105vh) rotate(540deg);opacity:0;}}

    /* ── BOTTOM NAV ── */
    .gnav{position:fixed;bottom:13px;left:50%;transform:translateX(-50%);z-index:999;display:none;gap:6px;background:rgba(13,6,38,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:7px 13px;border-radius:60px;border:1.5px solid rgba(255,255,255,.07);box-shadow:0 8px 30px rgba(0,0,0,.5);}
    .gnav button{background:rgba(255,255,255,.07);border:none;color:#fff;padding:7px 13px;border-radius:28px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:.2s;font-size:.78rem;white-space:nowrap;min-height:34px;}
    .gnav button:hover{transform:scale(1.07);}
    .gnhome{background:rgba(255,107,53,.18)!important;color:var(--primary)!important;border:1px solid rgba(255,107,53,.3)!important;}
    .gnprev,.gnnext{background:rgba(123,94,167,.18)!important;color:#c4b5e0!important;border:1px solid rgba(123,94,167,.3)!important;}
    .gnsite{background:rgba(87,204,153,.13)!important;color:var(--green)!important;border:1px solid rgba(87,204,153,.25)!important;}

    @media(max-width:600px){
      .gcard{padding:16px 10px 22px;}
      .wbig{font-size:clamp(1.55rem,6vw,2.2rem);padding:11px 16px;}
      .opt{font-size:.95rem;padding:9px 14px;min-height:44px;}
      .ghtitle{font-size:1.2rem;}
    }
  </style>
</head>
<body>
  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="bg-anim" id="homeBg"></div>
    <div class="home-inner">
      <div style="font-size:3rem;margin-bottom:6px;">⭐</div>
      <h1 class="hero-title">Dyslexia Quest</h1>
      <p class="hero-sub">20 fun games to build reading &amp; spelling power</p>
      <div class="hero-badge">👧👦 Ages 4-10 · Tap a game to play!</div>
      <div class="home-grid" id="homeGrid"></div>
      <a href="https://sander-ali.github.io" class="btn-site" style="margin-top:26px;">🏠 Back to sander-ali.github.io</a>
    </div>
  </div>

  <!-- GAME PAGES -->
  <div id="page-game-1" class="page"></div><div id="page-game-2" class="page"></div>
  <div id="page-game-3" class="page"></div><div id="page-game-4" class="page"></div>
  <div id="page-game-5" class="page"></div><div id="page-game-6" class="page"></div>
  <div id="page-game-7" class="page"></div><div id="page-game-8" class="page"></div>
  <div id="page-game-9" class="page"></div><div id="page-game-10" class="page"></div>
  <div id="page-game-11" class="page"></div><div id="page-game-12" class="page"></div>
  <div id="page-game-13" class="page"></div><div id="page-game-14" class="page"></div>
  <div id="page-game-15" class="page"></div><div id="page-game-16" class="page"></div>
  <div id="page-game-17" class="page"></div><div id="page-game-18" class="page"></div>
  <div id="page-game-19" class="page"></div><div id="page-game-20" class="page"></div>

  <div class="confbox" id="cfbox"></div>
  <div class="gnav" id="gnav">
    <button class="gnhome" onclick="go('home')">🏠 Home</button>
    <button class="gnsite" onclick="window.location.href='https://sander-ali.github.io'">🌐 Site</button>
    <button class="gnprev" onclick="navG(-1)">◀ Prev</button>
    <button class="gnnext" onclick="navG(1)">Next ▶</button>
  </div>

<script>
// ================================================================
//  GAME CATALOGUE
// ================================================================
const GAMES=[
  {id:1,icon:'🔤',name:'Word Match',desc:'Match emoji to its word'},
  {id:2,icon:'📖',name:'Spell It!',desc:'Read definition, spell word'},
  {id:3,icon:'🧠',name:'Memory Cards',desc:'Find matching emoji+word pairs'},
  {id:4,icon:'🔍',name:'Word Search',desc:'Tap each letter of the hidden word'},

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const aiCache={};
async function aiCall(prompt){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    if(!r.ok)return null;
    const d=await r.json();
    const t=d.content?.find(b=>b.type==="text")?.text||"";
    return JSON.parse(t.replace(/```json\n?|```/g,"").trim());
  }catch{return null;}
}
async function aiBatch(gid,level){
  if(aiCache[gid]?.length>0)return aiCache[gid].shift();
  const dif=diff(level);
  let prompt;
  if(gid===2)prompt=`Generate 6 English vocabulary words for dyslexic children aged 6-12 (difficulty: ${dif}). Return ONLY a JSON array: [{"word":"WORD","definition":"simple child-friendly definition"},...]. Common nouns/adjectives. No extra text, just the JSON array.`;
  else if(gid===12)prompt=`Generate 6 crossword clues for dyslexic children aged 6-12 (difficulty: ${dif}). Return ONLY a JSON array: [{"clue":"A flying bird","answer":"EAGLE","hint":"🦅"},...]. Answers must be uppercase, 3-8 letters. No extra text, just the JSON array.`;
  else if(gid===14)prompt=`Generate 6 fill-in-the-blank sentences for dyslexic children aged 6-12 (difficulty: ${dif}). Return ONLY a JSON array: [{"sentence":"The ___ barks loudly.","answers":["DOG"],"hint":"🐶"},...]. One blank, common words. No extra text, just the JSON array.`;
  const batch=await aiCall(prompt);
  if(Array.isArray(batch)&&batch.length>0){aiCache[gid]=batch.slice(1);return batch[0];}
  return null;
}

function mascot(id,type){

function lvlHdr(id,level,score,streak){
  const pct=Math.min(100,(score/20)*100);
  return `<div class="lvlhdr">
    <span class="lvlbadge">Level ${level}/20</span>
    <div class="progwrap"><div class="progfill" id="pf${id}" style="width:${pct}%"></div></div>
    <span class="scorelbl">${score}/20</span>
    <span class="strkbadge ${streak>=3?'on':''}" id="sb${id}">🔥 ${streak}</span>
  </div>`;
}

function loadGame(id){
  const page=document.getElementById('page-game-'+id);
  if(!page)return;
  const g=GAMES.find(x=>x.id===id);
  page.style.background=bgGrad(id);
  if(!page.querySelector('.gcard')){
    page.innerHTML=`<div class="bg-anim">${bgDecor(id)}</div>
    <div class="gcard">
      <div class="ghdr"><span class="ghic">${g.icon}</span>
        <div><div class="ghtitle">${g.name}</div><div class="ghdesc">${g.desc}</div></div>
      </div>
      <div class="mascwrap"><span class="masc" id="m${id}">⭐</span></div>
      <div class="gc"></div>
    </div>`;
  }
  if(!states[id])states[id]={level:1,score:0,streak:0};
  if(!used[id])used[id]=[];
  if(renders[id])renders[id](id,states[id].level);
  else page.querySelector('.gc').innerHTML='<p style="color:#fff;text-align:center;padding:20px;">Coming soon!</p>';
}

function pickWord(id,p){
  if(!used[id])used[id]=[];
  let av=p.filter(w=>!used[id].includes(w));
  if(!av.length){used[id]=[];av=[...p];}
  const w=av[Math.floor(Math.random()*av.length)];
  used[id].push(w);
  if(used[id].length>Math.floor(p.length*.7))used[id].shift();
  return w;
}

function onRight(id,fb,nxt,msg){
  const s=states[id];s.score++;s.streak=(s.streak||0)+1;
  fb.className='fb correct';
  fb.textContent=msg||(s.streak>=3?`🔥 ${s.streak} in a row! You're on fire!`:'⭐ Correct! Well done!');
  confetti();
  const sbEl=document.getElementById('sb'+id);
  if(sbEl){sbEl.textContent=`🔥 ${s.streak}`;if(s.streak>=3)sbEl.classList.add('on');}
  const pf=document.getElementById('pf'+id);
  if(pf)pf.style.width=Math.min(100,(s.score/20)*100)+'%';
  mascot(id,'celeb');
  if(s.score>=20)nxt.textContent='🎉 Mastered! Play Again';
  nxt.classList.add('on');
}

function onWrong(id,fb,el,msg){
  const s=states[id];s.streak=0;
  fb.className='fb wrong';fb.textContent=msg||'❌ Try again!';
  const sbEl=document.getElementById('sb'+id);if(sbEl)sbEl.classList.remove('on');
  mascot(id,'oops');
  if(el){el.classList.add('wrong');setTimeout(()=>el.classList.remove('wrong'),500);}
}

function nextLvl(id,trackers){
  const s=states[id];
  if(s.score>=20){s.score=0;s.level=0;if(trackers)trackers.forEach(t=>{if(t)t[id]=[];});else used[id]=[];}
  s.level=s.level<20?s.level+1:1;
  if(s.level===1){s.score=0;if(trackers)trackers.forEach(t=>{if(t)t[id]=[];});else used[id]=[];}
  renders[id](id,s.level);
}
function rst(id,trackers){
  const s=states[id];s.level=1;s.score=0;s.streak=0;
  if(trackers)trackers.forEach(t=>{if(t)t[id]=[];});else used[id]=[];
  renders[id](id,1);
}

renders[1]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  const p=pool(level),w=pickWord(id,p),emoji=em(w);
  const others=shuffle(p.filter(x=>x!==w)),opts=shuffle([w,...others.slice(0,nOpts(level)-1)]);
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Which word matches this picture?</p>
  <div class="wbig" style="font-size:4rem;background:transparent;border-color:transparent;">${emoji}</div>
  <div class="opts" id="o1">${opts.map(x=>`<button class="opt" data-w="${x}">${x}</button>`).join('')}</div>
  <div class="fb" id="f1">👆 Tap the correct word!</div>
  <div class="btnrow"><button class="btn btn-next" id="n1">➜ Next</button><button class="btn btn-rst" id="r1">⟳ Restart</button></div>`;
  const fb=document.getElementById('f1'),nxt=document.getElementById('n1');let done=false;
  c.querySelectorAll('#o1 .opt').forEach(b=>b.addEventListener('click',function(){
    if(done)return;
    if(this.dataset.w===w){this.classList.add('correct');done=true;onRight(id,fb,nxt,`⭐ "${w}" is correct!`);c.querySelectorAll('#o1 .opt').forEach(x=>x.disabled=true);}
    else onWrong(id,fb,this,`❌ "${this.dataset.w}" is not right. Look at the picture again!`);
  }));
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r1').addEventListener('click',()=>rst(id));
};

renders[2]=async function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}<div class="aiload"><div class="spinner"></div><p>Creating a question for you ✨</p></div>`;
  let word,definition;
  const ai=await aiBatch(2,level);
  if(ai?.word&&ai?.definition){word=ai.word.toUpperCase();definition=ai.definition;}
  else{word=pickWord(id,pool(level));definition=DEFS[word]||'A common English word';}
  const dif=diff(level);
  const hint=dif==='easy'?`Starts with "${word[0]}" · ${word.length} letters`:dif==='medium'?`${word.length} letters`:'';
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Read the definition and spell the word:</p>
  <div style="background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);border-radius:22px;padding:15px 18px;text-align:center;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:11px;">${definition}</div>
  ${hint?`<div class="tip">💡 Hint: ${hint}</div>`:''}
  <div class="inpwrap"><input type="text" class="inp" id="i2" placeholder="Spell the word…" autocomplete="off" autocorrect="off" spellcheck="false"><button class="btn btn-chk" id="c2">Check ✓</button></div>
  <div class="fb" id="f2">Type your answer above</div>
  <div class="btnrow"><button class="btn btn-next" id="n2">➜ Next</button><button class="btn btn-rst" id="r2">⟳ Restart</button><button class="btn btn-hint" id="h2">💡 Hint</button></div>`;
  const inp=document.getElementById('i2'),fb=document.getElementById('f2'),nxt=document.getElementById('n2');
  let hc=0;setTimeout(()=>inp.focus(),100);
  function chk(){const g=inp.value.trim().toUpperCase();if(!g){fb.textContent='✏️ Type something first!';return;}
    if(g===word){inp.disabled=true;onRight(id,fb,nxt,`⭐ Yes! The answer is "${word}"!`);}
    else onWrong(id,fb,null,`❌ "${g}" is not right. Check your spelling!`);}
  document.getElementById('c2').addEventListener('click',chk);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')chk();});
  document.getElementById('h2').addEventListener('click',()=>{hc++;
    if(hc===1){fb.textContent=`💡 Starts with "${word[0]}", has ${word.length} letters`;fb.className='fb';}
    else if(hc===2){fb.textContent=`💡 Middle letter: "${word[Math.floor(word.length/2)]}"`;fb.className='fb';}
    else{fb.textContent=`💡 The answer is: ${word}`;fb.className='fb';}});
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r2').addEventListener('click',()=>{aiCache[2]=[];rst(id);});
};

  const allPairs=Object.entries(EM).slice(0,35).map(([w,e])=>({w,e}));
  shuffle(allPairs);const pairs=allPairs.slice(0,np);
  const cards=[];pairs.forEach(p=>{cards.push({id:p.w,disp:p.e,t:'e'});cards.push({id:p.w,disp:p.w,t:'w'});});
  shuffle(cards);
  const cols=np<=4?4:np<=6?4:np<=8?4:5;
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}

  <div class="btnrow"><button class="btn btn-next" id="n3">➜ Next</button><button class="btn btn-rst" id="r3">⟳ Restart</button></div>`;
  const fb=document.getElementById('f3'),nxt=document.getElementById('n3');
  let flipped=[],matched=0,locked=false;
  c.querySelectorAll('.mc').forEach(card=>card.addEventListener('click',function(){
    if(locked||this.classList.contains('flip')||this.classList.contains('matched'))return;
    this.classList.add('flip');flipped.push(this);
    if(flipped.length===2){locked=true;
      if(flipped[0].dataset.id===flipped[1].dataset.id){
        flipped.forEach(x=>x.classList.add('matched'));matched++;
        fb.textContent=`✅ Match! ${matched}/${np} found`;fb.className='fb correct';
        if(matched===np)onRight(id,fb,nxt,`🎉 All ${np} pairs matched!`);
        flipped=[];locked=false;
      }else{fb.textContent='❌ Not a match! Try again…';fb.className='fb wrong';
        mascot(id,'oops');
        setTimeout(()=>{flipped.forEach(x=>x.classList.remove('flip'));flipped=[];locked=false;fb.textContent='Tap two cards to reveal them';fb.className='fb';},900);}
    }
  }));
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r3').addEventListener('click',()=>rst(id));
};

// ================================================================

renders[4]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  const p=pool(level),target=pickWord(id,p);
  const gs=level<=5?5:level<=10?6:level<=15?7:8;
  const grid=Array.from({length:gs},()=>Array(gs).fill(''));
  const dirs=[{dr:0,dc:1},{dr:1,dc:0}];
  if(level>10)dirs.push({dr:1,dc:1});shuffle(dirs);
  let placed=false;
  for(const d of dirs){
    const mr=d.dr===0?gs:gs-target.length,mc=d.dc===0?gs:gs-target.length;
    if(mr<=0||mc<=0)continue;
    const sr=Math.floor(Math.random()*mr),sc=Math.floor(Math.random()*mc);
    let ok=true;
    for(let i=0;i<target.length;i++){if(grid[sr+d.dr*i]?.[sc+d.dc*i]!==''){ok=false;break;}}
    if(ok){for(let i=0;i<target.length;i++)grid[sr+d.dr*i][sc+d.dc*i]=target[i];placed=true;break;}
  }
  if(!placed){for(let i=0;i<target.length&&i<gs;i++)grid[0][i]=target[i];}
  const ABC='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<gs;r++)for(let cc=0;cc<gs;cc++)if(!grid[r][cc])grid[r][cc]=ABC[Math.floor(Math.random()*26)];
  // Find target positions
  const tPos=new Set();
  for(let r=0;r<gs;r++)for(let cc=0;cc<gs;cc++){
    if(grid[r][cc]===target[0]){
      for(const d of [{dr:0,dc:1},{dr:1,dc:0},{dr:1,dc:1}]){
        let ok=true;const pos=[];
        for(let i=0;i<target.length;i++){const nr=r+d.dr*i,nc=cc+d.dc*i;if(nr>=gs||nc>=gs||grid[nr]?.[nc]!==target[i]){ok=false;break;}pos.push(nr*gs+nc);}
        if(ok)pos.forEach(p=>tPos.add(p));
      }
    }
  }
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Find the word: <strong style="color:var(--yellow);letter-spacing:3px;">${target}</strong></p>
  <div class="wsg" id="wg4" style="grid-template-columns:repeat(${gs},1fr);">
    ${grid.flat().map((l,i)=>`<div class="wsc" data-i="${i}" data-l="${l}">${l}</div>`).join('')}
  </div>
  <div class="fb" id="f4">Tap the letters of "${target}" in order</div>
  <div class="btnrow"><button class="btn btn-next" id="n4">➜ Next</button><button class="btn btn-rst" id="r4">⟳ Restart</button></div>`;
  const fb=document.getElementById('f4'),nxt=document.getElementById('n4');let prog=0;
  c.querySelectorAll('.wsc').forEach(cell=>cell.addEventListener('click',function(){
    const i=parseInt(this.dataset.i),l=this.dataset.l;
    if(this.classList.contains('found'))return;
    if(l===target[prog]&&tPos.has(i)){
      this.classList.add('sel','found');prog++;
      fb.textContent=`✅ ${prog}/${target.length} letters found`;fb.className='fb correct';
      if(prog===target.length)onRight(id,fb,nxt,`🎉 Found "${target}"!`);
    }else{
      this.classList.add('blink');onWrong(id,fb,null,`❌ Find "${target[prog]}" next`);
      setTimeout(()=>this.classList.remove('blink'),500);
    }
  }));
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r4').addEventListener('click',()=>rst(id));
};

  ${level<=5?`<div class="tip">💡 Vowels are: A · E · I · O · U</div>`:''}
  <div class="opts" id="o16">${opts.map(n=>`<button class="opt" data-n="${n}" style="font-size:1.75rem;padding:12px 20px;">${n}</button>`).join('')}</div>
  <div class="fb" id="f16">Count the vowels in "${word}"</div>
  <div class="btnrow"><button class="btn btn-next" id="n16">➜ Next</button><button class="btn btn-rst" id="r16">⟳ Restart</button></div>`;
  const fb=document.getElementById('f16'),nxt=document.getElementById('n16');let done=false;
  c.querySelectorAll('#o16 .opt').forEach(b=>b.addEventListener('click',function(){
    if(done)return;
    if(parseInt(this.dataset.n)===vc){this.classList.add('correct');done=true;
      document.getElementById('vword').style.display='none';
      document.getElementById('chips16').style.display='flex';
      onRight(id,fb,nxt,`⭐ "${word}" has ${vc} vowel${vc!==1?'s':''}!`);c.querySelectorAll('#o16 .opt').forEach(x=>x.disabled=true);}
    else onWrong(id,fb,this,`❌ Not ${this.dataset.n}. Vowels are A,E,I,O,U — count again!`);
  }));
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r16').addEventListener('click',()=>rst(id));
};

// ================================================================
//  GAME 17 — QUICK FIRE (timer at levels 11+)
// ================================================================
const QI=[
  {e:'🐱',n:'CAT'},{e:'🐶',n:'DOG'},{e:'🐟',n:'FISH'},{e:'⭐',n:'STAR'},{e:'🌙',n:'MOON'},
  {e:'☀️',n:'SUN'},{e:'🍎',n:'APPLE'},{e:'🍌',n:'BANANA'},{e:'🏠',n:'HOUSE'},{e:'🚗',n:'CAR'},
  {e:'🐸',n:'FROG'},{e:'🦁',n:'LION'},{e:'🐘',n:'ELEPHANT'},{e:'🚂',n:'TRAIN'},{e:'🎂',n:'CAKE'},
  {e:'🌈',n:'RAINBOW'},{e:'🚀',n:'ROCKET'},{e:'🐯',n:'TIGER'},{e:'🌸',n:'FLOWER'},
  {e:'🦋',n:'BUTTERFLY'},{e:'🐧',n:'PENGUIN'},{e:'🦊',n:'FOX'},{e:'🌻',n:'SUNFLOWER'},
  {e:'🦓',n:'ZEBRA'},{e:'🐬',n:'DOLPHIN'},{e:'🏰',n:'CASTLE'},{e:'🌍',n:'EARTH'},
  {e:'❄️',n:'SNOW'},{e:'🎵',n:'MUSIC'},{e:'🦅',n:'EAGLE'},
];
const usedQ={};
renders[17]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  if(!usedQ[id])usedQ[id]=[];
  let av=QI.map((_,i)=>i).filter(i=>!usedQ[id].includes(i));
  if(!av.length){usedQ[id]=[];av=QI.map((_,i)=>i);}
  const idx=av[Math.floor(Math.random()*av.length)];usedQ[id].push(idx);
  const pk=QI[idx];
  const hasT=level>10,tl=level<=15?20:12;
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">What is this?</p>
  <div style="font-size:5.5rem;text-align:center;margin:14px 0;animation:mascFloat 2s ease-in-out infinite;">${pk.e}</div>
  ${hasT?`<div class="timerwrap"><div class="timerfill" id="ti17" style="width:100%"></div></div><p style="text-align:center;font-size:.78rem;color:var(--dim);margin-top:3px;" id="ts17">${tl}s</p>`:''}
  <div class="inpwrap"><input type="text" class="inp" id="i17" placeholder="Name it!" autocomplete="off" autocorrect="off" spellcheck="false"><button class="btn btn-chk" id="c17">Check ✓</button></div>
  <div class="fb" id="f17">Type the name of this object</div>
  <div class="btnrow"><button class="btn btn-next" id="n17">➜ Next</button><button class="btn btn-rst" id="r17">⟳ Restart</button></div>`;
  const inp=document.getElementById('i17'),fb=document.getElementById('f17'),nxt=document.getElementById('n17');
  let done=false,ti;setTimeout(()=>inp.focus(),100);
  if(hasT){let rem=tl;const tel=document.getElementById('ti17'),ts=document.getElementById('ts17');
    ti=setInterval(()=>{if(done){clearInterval(ti);return;}rem--;
      tel.style.width=(rem/tl*100)+'%';ts.textContent=rem+'s';
      if(rem<=0){clearInterval(ti);done=true;fb.textContent=`⏰ Time's up! It was "${pk.n}"`;fb.className='fb wrong';nxt.classList.add('on');mascot(id,'oops');}
    },1000);}
  function chk(){if(done)return;const g=inp.value.trim().toUpperCase();if(!g)return;
    if(g===pk.n){done=true;if(ti)clearInterval(ti);inp.disabled=true;onRight(id,fb,nxt,`⭐ "${pk.n}" is correct!`);}
    else onWrong(id,fb,null,`❌ That's not right. Try again!`);}
  document.getElementById('c17').addEventListener('click',chk);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')chk();});
  nxt.addEventListener('click',()=>{if(ti)clearInterval(ti);nextLvl(id,[usedQ]);});
  document.getElementById('r17').addEventListener('click',()=>{if(ti)clearInterval(ti);rst(id,[usedQ]);});
};

// ================================================================
//  GAME 18 — MEMORY TRAIL (longer sequences, shorter show-time at high levels)
// ================================================================
renders[18]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  const seqLen=level<=4?3:level<=8?4:level<=12?5:level<=16?6:7;
  const showMs=Math.max(1800,5000-(level*200));
  const syms=['🐱','🐶','⭐','🌙','🐟','☀️','🍎','🚗','🎵','🌈'];
  const seq=Array.from({length:seqLen},()=>syms[Math.floor(Math.random()*syms.length)]);
  let step=0,over=false;
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Remember this sequence, then repeat it! (${seqLen} symbols)</p>
  <div id="ss18" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:2.3rem;margin:13px 0;padding:12px;background:rgba(255,255,255,.05);border-radius:22px;transition:opacity .5s;">
    ${seq.map(x=>`<span style="padding:5px;display:inline-block;">${x}</span>`).join('')}
  </div>
  <p style="text-align:center;font-size:.8rem;color:var(--dim);font-weight:600;" id="ct18">Watch for ${Math.ceil(showMs/1000)}s…</p>
  <div class="opts" id="o18">${syms.map(x=>`<button class="opt" data-s="${x}" style="font-size:1.75rem;padding:9px 14px;" disabled>${x}</button>`).join('')}</div>
  <div class="fb" id="f18">Memorise the sequence above!</div>
  <div class="btnrow"><button class="btn btn-next" id="n18">➜ Next</button><button class="btn btn-rst" id="r18">⟳ Restart</button></div>`;
  const ss=document.getElementById('ss18'),fb=document.getElementById('f18'),ct=document.getElementById('ct18'),nxt=document.getElementById('n18');
  setTimeout(()=>{ss.style.opacity='0';setTimeout(()=>ss.style.display='none',500);
    ct.textContent='Now tap them in order!';fb.textContent=`Tap ${seqLen} symbols in order!`;
    c.querySelectorAll('#o18 .opt').forEach(b=>b.disabled=false);
  },showMs);
  c.querySelectorAll('#o18 .opt').forEach(b=>b.addEventListener('click',function(){
    if(over||this.disabled)return;
    const ch=this.dataset.s;
    if(ch===seq[step]){this.classList.add('correct');step++;
      fb.textContent=`✅ ${step}/${seqLen}`;fb.className='fb correct';
      setTimeout(()=>this.classList.remove('correct'),400);
      if(step===seqLen){over=true;onRight(id,fb,nxt,`🎉 Perfect! All ${seqLen} remembered!`);}
    }else{over=true;fb.textContent=`❌ Sequence was: ${seq.join(' ')}`;fb.className='fb wrong';
      ss.innerHTML=seq.map(x=>`<span style="padding:5px;display:inline-block;">${x}</span>`).join('');
      ss.style.display='flex';ss.style.opacity='1';mascot(id,'oops');states[id].streak=0;nxt.classList.add('on');}
  }));
  nxt.addEventListener('click',()=>nextLvl(id));
  document.getElementById('r18').addEventListener('click',()=>rst(id));
};

// ================================================================
//  GAME 19 — STORY SORT (more stories, fewer events at low levels)
// ================================================================
const SORTS=[
  {ev:['🌅 Wake up','🍳 Cook breakfast','🚌 Ride the bus','🏫 Arrive at school','🛏️ Go to sleep']},
  {ev:['🌱 Plant a seed','💧 Water it daily','🌿 See a sprout','🌻 Flower blooms','🌸 Pick the flower']},
  {ev:['📖 Open the book','📝 Read the first page','🤔 Think about it','📕 Close the book','💬 Tell a friend']},
  {ev:['🛒 Go shopping','🥦 Pick vegetables','💳 Pay at checkout','🚗 Drive home','🍲 Cook the meal']},
  {ev:['🌧️ Dark clouds form','⛈️ Rain starts','🌈 Rain stops','🌤️ Sun comes out','☀️ Everything dries']},
  {ev:['✏️ Sharpen pencil','📄 Get blank paper','🖊️ Start writing','📖 Read it back','📤 Hand it in']},
  {ev:['🦷 Brush teeth','🛁 Take a bath','👕 Put on pyjamas','📖 Bedtime story','😴 Fall asleep']},
  {ev:['🌄 Sunrise','🌞 Midday','🌆 Afternoon','🌇 Sunset','🌙 Night time']},
  {ev:['🧩 Open puzzle box','📋 Look at picture','🔍 Find edge pieces','🏗️ Build the frame','🎉 Puzzle complete']},
  {ev:['🥚 Egg hatches','🐥 Chick grows','🐔 Becomes a hen','🥚 Lays an egg','🐣 New chick hatches']},
];
const usedSo={};
renders[19]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  if(!usedSo[id])usedSo[id]=[];
  let av=SORTS.map((_,i)=>i).filter(i=>!usedSo[id].includes(i));
  if(!av.length){usedSo[id]=[];av=SORTS.map((_,i)=>i);}
  const idx=av[Math.floor(Math.random()*av.length)];usedSo[id].push(idx);
  const pk=SORTS[idx];
  const ne=level<=5?3:level<=10?4:5;
  const events=pk.ev.slice(0,ne);
  const shuf=shuffle([...events]);
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Tap the events in the correct order! (${ne} steps)</p>
  <div class="sortlist" id="sl19">${shuf.map(e=>`<button class="sortitem" data-e="${e}">${e}</button>`).join('')}</div>
  <div class="fb" id="f19">Tap the FIRST thing that happens…</div>
  <div class="btnrow"><button class="btn btn-next" id="n19">➜ Next</button><button class="btn btn-rst" id="r19">⟳ Restart</button></div>`;
  const fb=document.getElementById('f19'),nxt=document.getElementById('n19');let sel=0;
  c.querySelectorAll('.sortitem').forEach(b=>b.addEventListener('click',function(){
    if(this.classList.contains('correct'))return;
    if(this.dataset.e===events[sel]){this.classList.add('correct');this.style.pointerEvents='none';sel++;
      fb.textContent=`✅ ${sel}/${ne}`;fb.className='fb correct';
      if(sel===ne)onRight(id,fb,nxt,`🎉 Story sorted correctly!`);}
    else{this.classList.add('wrong');onWrong(id,fb,null,`❌ That's not step ${sel+1}. What happens first?`);setTimeout(()=>this.classList.remove('wrong'),500);}
  }));
  nxt.addEventListener('click',()=>nextLvl(id,[usedSo]));
  document.getElementById('r19').addEventListener('click',()=>rst(id,[usedSo]));
};

// ================================================================
//  GAME 20 — WORD FAMILIES (expanded families, more options)
// ================================================================
const WFAM=[
  {f:'-at',ws:['CAT','BAT','HAT','RAT','MAT','SAT','FAT','PAT']},
  {f:'-og',ws:['DOG','FOG','LOG','HOG','JOG','BOG']},
  {f:'-un',ws:['SUN','FUN','RUN','BUN','GUN','NUN','PUN']},
  {f:'-ish',ws:['FISH','DISH','WISH','SWISH']},
  {f:'-ake',ws:['CAKE','BAKE','LAKE','MAKE','TAKE','RAKE','WAKE','FAKE']},
  {f:'-all',ws:['BALL','CALL','FALL','WALL','TALL','HALL','MALL','SMALL']},
  {f:'-ight',ws:['LIGHT','NIGHT','RIGHT','FIGHT','MIGHT','SIGHT','TIGHT']},
  {f:'-ing',ws:['RING','SING','KING','WING','BRING','THING','SPRING']},
  {f:'-ound',ws:['ROUND','FOUND','SOUND','GROUND','MOUND','BOUND']},
  {f:'-ail',ws:['TAIL','MAIL','SAIL','RAIL','BAIL','SNAIL','TRAIL']},
  {f:'-eep',ws:['DEEP','KEEP','PEEP','SHEEP','STEEP','CREEP']},
  {f:'-ool',ws:['COOL','FOOL','POOL','TOOL','SCHOOL']},
  {f:'-ack',ws:['BACK','JACK','PACK','RACK','SNACK','TRACK','BLACK']},
  {f:'-ame',ws:['CAME','GAME','SAME','FAME','NAME','TAME','FLAME']},
  {f:'-ine',ws:['LINE','MINE','PINE','VINE','SHINE','SPINE','TWINE']},
];
const usedF={};
renders[20]=function(id,level){
  const s=states[id],c=document.getElementById('page-game-'+id).querySelector('.gc');
  if(!usedF[id])usedF[id]=[];
  let av=WFAM.map((_,i)=>i).filter(i=>!usedF[id].includes(i));
  if(!av.length){usedF[id]=[];av=WFAM.map((_,i)=>i);}
  const idx=av[Math.floor(Math.random()*av.length)];usedF[id].push(idx);
  const pk=WFAM[idx];
  const target=pk.ws[Math.floor(Math.random()*pk.ws.length)];
  const famAns=pk.ws.find(w=>w!==target);
  const allW=Object.values(WP).flat();
  const dist=shuffle(allW.filter(w=>!pk.ws.includes(w)));
  const opts=shuffle([famAns,...dist.slice(0,nOpts(level)-1)]);
  c.innerHTML=`${lvlHdr(id,level,s.score,s.streak||0)}
  <p class="qtxt">Which word belongs to the same family as</p>
  <div class="wbig">${target}</div>
  <div class="tip">Family: <strong>${pk.f}</strong> &nbsp;—&nbsp; words that end in "${pk.f}"</div>
  <div class="opts" id="o20">${opts.map(w=>`<button class="opt" data-w="${w}">${w}</button>`).join('')}</div>
  <div class="fb" id="f20">Find a word ending in "${pk.f}"</div>
  <div class="btnrow"><button class="btn btn-next" id="n20">➜ Next</button><button class="btn btn-rst" id="r20">⟳ Restart</button></div>`;
  const fb=document.getElementById('f20'),nxt=document.getElementById('n20');let done=false;
  c.querySelectorAll('#o20 .opt').forEach(b=>b.addEventListener('click',function(){
    if(done)return;
    const w=this.dataset.w;
    if(pk.ws.includes(w)&&w!==target){this.classList.add('correct');done=true;onRight(id,fb,nxt,`⭐ "${w}" is in the "${pk.f}" family!`);c.querySelectorAll('#o20 .opt').forEach(x=>x.disabled=true);}
    else if(w===target)onWrong(id,fb,this,`❌ That's the same word! Find a DIFFERENT "${pk.f}" word.`);
    else onWrong(id,fb,this,`❌ "${w}" is not in the "${pk.f}" family. Try again!`);
  }));
  nxt.addEventListener('click',()=>nextLvl(id,[usedF]));
  document.getElementById('r20').addEventListener('click',()=>rst(id,[usedF]));
};

// ================================================================
//  INIT
// ================================================================
go('home');
</script>
</body>
</html>
